# Publish docs/stock-tool/index.html to GitHub Pages (static site only).
# After pushing this file to a repo you own: Settings → Pages → Build and deployment
# → Source → GitHub Actions. Then Actions → "Stock tool GitHub Pages" → Run workflow.

name: Stock tool GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stock-tool-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/stock-tool

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
