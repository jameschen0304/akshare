name: Update steel spot snapshot

on:
  workflow_dispatch:
  schedule:
    # Weekdays 09:30 CST (01:30 UTC)
    - cron: "30 1 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pandas requests beautifulsoup4 lxml html5lib

      - name: Refresh steel spot snapshot
        run: |
          python scripts/update_steel_spot_snapshot.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- docs/futures-tool/steel_spot_daily.json docs/futures-tool/steel_spot_daily.js; then
            echo "No snapshot change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/futures-tool/steel_spot_daily.json docs/futures-tool/steel_spot_daily.js
          git commit -m "chore: auto update steel spot snapshot"
          git push
